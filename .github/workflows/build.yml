name: Build Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller ttkbootstrap matplotlib openpyxl pillow
    
    - name: Build .exe
      run: |
        pyinstaller --onefile --windowed --name "成本及ROI计算器" "成本及ROI计算器.py"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-exe
        path: dist/成本及ROI计算器.exe